<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Isaiah Music Reviews</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

header {
  background: #d60000;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
}

.container {
  padding: 40px;
}

input, button {
  width: 80%;
  max-width: 400px;
  padding: 12px;
  margin: 10px;
  border-radius: 6px;
  border: none;
}

button {
  background: #d60000;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.song {
  background: #222;
  margin: 10px auto;
  padding: 10px;
  max-width: 500px;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>
Isaiah Music Reviews
</header>

<div class="container">

<h2>Submit Your Song</h2>

<input type="text" id="name" placeholder="Your Name">

<input type="file" id="file">

<button onclick="uploadSong()">Upload</button>

<h2>Submissions</h2>
<div id="list"></div>

</div>

<script type="module">
// Firebase setup
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-storage.js";
import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

window.uploadSong = async function () {
  const name = document.getElementById("name").value;
  const file = document.getElementById("file").files[0];

  if (!file) return alert("Pick a file first");

  const storageRef = ref(storage, "songs/" + file.name);

  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "songs"), {
    name: name,
    url: url,
    time: Date.now()
  });

  alert("Uploaded!");
  loadSongs();
};

async function loadSongs() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "songs"));

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    list.innerHTML += `
      <div class="song">
        <p><b>${data.name}</b></p>
        <audio controls src="${data.url}"></audio>
      </div>
    `;
  });
}

loadSongs();
</script>

</body>
</html>
