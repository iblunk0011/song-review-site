<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Isaiah Music App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

header {
  background: #d60000;
  padding: 18px;
  font-size: 24px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

input, button {
  width: 85%;
  max-width: 400px;
  padding: 12px;
  margin: 8px;
  border-radius: 6px;
  border: none;
}

button {
  background: #d60000;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.song {
  background: #1f1f1f;
  margin: 10px auto;
  padding: 10px;
  max-width: 500px;
  border-radius: 8px;
  text-align: left;
}
</style>
</head>

<body>

<header>Isaiah Music App</header>

<div class="container">

<h3>Login</h3>
<input id="email" placeholder="email">
<input id="password" placeholder="password" type="password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<hr>

<h3>Upload Song</h3>
<input id="songName" placeholder="Song Name">
<input type="file" id="file">
<button onclick="uploadSong()">Upload</button>

<h3>Feed</h3>
<div id="feed"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { 
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-storage.js";

import {
  getFirestore,
  addDoc,
  collection,
  query,
  orderBy,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const storage = getStorage(app);
const db = getFirestore(app);

let currentUser = null;

window.signup = async function () {
  const email = emailInput().value;
  const password = passInput().value;
  await createUserWithEmailAndPassword(auth, email, password);
  alert("Account created");
};

window.login = async function () {
  const email = emailInput().value;
  const password = passInput().value;
  await signInWithEmailAndPassword(auth, email, password);
  alert("Logged in");
};

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user) loadSongs();
});

window.uploadSong = async function () {
  if (!currentUser) return alert("Login first");

  const name = document.getElementById("songName").value;
  const file = document.getElementById("file").files[0];

  if (!file) return alert("Pick a file");

  const storageRef = ref(storage, "songs/" + file.name);

  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "songs"), {
    name,
    url,
    userId: currentUser.uid,
    status: "pending",
    time: Date.now()
  });

  alert("Uploaded!");
  loadSongs();
};

async function loadSongs() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  const q = query(collection(db, "songs"), orderBy("time", "desc"));
  const snap = await getDocs(q);

  snap.forEach(doc => {
    const d = doc.data();

    if (d.status !== "approved") return;

    feed.innerHTML += `
      <div class="song">
        <p><b>${d.name}</b></p>
        <audio controls src="${d.url}"></audio>
      </div>
    `;
  });
}

function emailInput(){ return document.getElementById("email"); }
function passInput(){ return document.getElementById("password"); }

</script>

</body>
</html>
