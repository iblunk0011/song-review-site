<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isaiah Music Reviews</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

header {
  background: #d60000;
  padding: 18px;
  font-size: 24px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

input, button {
  width: 90%;
  max-width: 400px;
  padding: 12px;
  margin: 8px;
  border-radius: 6px;
  border: none;
}

button {
  background: #d60000;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.song {
  background: #1f1f1f;
  margin: 10px auto;
  padding: 10px;
  max-width: 500px;
  border-radius: 8px;
  text-align: left;
}
</style>
</head>

<body>

<header>Isaiah Music Reviews</header>

<div class="container">

<h3>Submit Your Song</h3>

<input id="name" placeholder="Your Name">
<input type="file" id="file">

<button onclick="uploadSong()">Upload Song</button>

<h3>Submissions</h3>
<div id="list"></div>

</div>

<script>
let songs = JSON.parse(localStorage.getItem("songs")) || [];

function uploadSong() {
  const name = document.getElementById("name").value;
  const file = document.getElementById("file").files[0];

  if (!file) {
    alert("Pick a file first");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const songData = {
      name: name || "Unknown",
      audio: e.target.result
    };

    songs.push(songData);
    localStorage.setItem("songs", JSON.stringify(songs));

    loadSongs();
    alert("Uploaded!");
  };

  reader.readAsDataURL(file);
}

function loadSongs() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  songs.forEach(song => {
    list.innerHTML += `
      <div class="song">
        <p><b>${song.name}</b></p>
        <audio controls src="${song.audio}"></audio>
      </div>
    `;
  });
}

loadSongs();
</script>

</body>
</html>
